<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accedi – PortfolioLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0d14; --bg2: #111420; --card: #161929;
      --border: #252840; --text: #e8eaf6; --muted: #7880a0;
      --accent: #6366f1; --accent2: #818cf8;
      --red: #f43f5e; --green: #22d3a0;
      --font: 'DM Sans', system-ui, sans-serif;
      --font-head: 'Space Grotesk', sans-serif;
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 20px;
    }
    .auth-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 36px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 8px 48px rgba(0,0,0,.5);
    }
    .auth-logo {
      font-family: var(--font-head); font-size: 22px; font-weight: 700;
      color: var(--accent2); margin-bottom: 4px;
    }
    .auth-tagline { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .auth-tabs {
      display: flex; margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1; background: transparent; border: none;
      border-bottom: 2px solid transparent; padding: 10px 0;
      cursor: pointer; color: var(--muted); font-size: 14px;
      font-family: inherit; font-weight: 500;
      transition: color .2s, border-color .2s; margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; color: var(--text);
      font-family: inherit; font-size: 14px;
      transition: border-color .2s; outline: none;
    }
    input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background .2s; margin-top: 4px;
    }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .msg { margin-top: 12px; font-size: 13px; min-height: 20px; }
    .msg.error { color: var(--red); }
    .msg.success { color: var(--green); }
    .forgot-link {
      font-size: 12px; color: var(--accent2); cursor: pointer;
      display: block; text-align: right; margin-top: -8px; margin-bottom: 16px;
    }
    .forgot-link:hover { color: var(--text); }
    .back-link {
      font-size: 12px; color: var(--accent2); cursor: pointer;
      display: inline-block; margin-bottom: 16px;
    }
    .back-link:hover { color: var(--text); }
    .reset-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; margin-top: 12px;
      font-size: 12px; color: var(--muted); word-break: break-all;
    }
    .reset-box a { color: var(--accent2); }
    .hint { font-size: 11px; color: var(--muted); margin-left: 4px; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">📊 PortfolioLab</div>
    <div class="auth-tagline">Il tuo dashboard di analisi portafoglio</div>

    <!-- ── Main login / register ── -->
    <div id="mainAuth">
      <div class="auth-tabs">
        <button class="tab-btn active" id="tabLogin"    onclick="switchTab('login')">Accedi</button>
        <button class="tab-btn"        id="tabRegister" onclick="switchTab('register')">Registrati</button>
      </div>

      <div class="auth-panel active" id="loginPanel">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" autocomplete="username" placeholder="Il tuo username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <span class="forgot-link" onclick="showForgot()">Password dimenticata?</span>
        <button class="btn-primary" id="loginBtn" onclick="doLogin()">Accedi</button>
        <div class="msg" id="loginMsg"></div>
      </div>

      <div class="auth-panel" id="registerPanel">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regUsername" autocomplete="username" placeholder="Scegli un username" />
        </div>
        <div class="form-group">
          <label>Email <span class="hint">(usata per il recupero password)</span></label>
          <input type="email" id="regEmail" autocomplete="email" placeholder="nome@esempio.com" />
        </div>
        <div class="form-group">
          <label>Password <span class="hint">min. 6 caratteri</span></label>
          <input type="password" id="regPassword" autocomplete="new-password" placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label>Conferma password</label>
          <input type="password" id="regPassword2" autocomplete="new-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="regBtn" onclick="doRegister()">Crea account</button>
        <div class="msg" id="regMsg"></div>
      </div>
    </div>

    <!-- ── Forgot password ── -->
    <div id="forgotPanel" style="display:none">
      <span class="back-link" onclick="hideForgot()">← Torna al login</span>
      <div class="form-group">
        <label>Email del tuo account</label>
        <input type="email" id="forgotEmail" placeholder="nome@esempio.com" />
      </div>
      <button class="btn-primary" id="forgotBtn" onclick="doForgot()">Invia link di recupero</button>
      <div class="msg" id="forgotMsg"></div>
      <div id="resetLinkBox" class="reset-box" style="display:none"></div>
    </div>

    <!-- ── Reset password (reached via link in email / reset-box) ── -->
    <div id="resetPanel" style="display:none">
      <div class="auth-logo" style="margin-bottom:12px;font-size:18px">Nuova password</div>
      <div class="form-group">
        <label>Nuova password <span class="hint">min. 6 caratteri</span></label>
        <input type="password" id="resetPassword" autocomplete="new-password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Conferma password</label>
        <input type="password" id="resetPassword2" autocomplete="new-password" placeholder="••••••••" />
      </div>
      <button class="btn-primary" id="resetBtn" onclick="doReset()">Imposta nuova password</button>
      <div class="msg" id="resetMsg"></div>
    </div>
  </div>

  <script>
    // If already authenticated, skip to app
    if (localStorage.getItem('auth_token')) window.location.href = '/';

    // Check for reset token in URL
    const _params     = new URLSearchParams(window.location.search);
    const _resetToken = _params.get('reset_token');
    if (_resetToken) {
      document.getElementById('mainAuth').style.display   = 'none';
      document.getElementById('resetPanel').style.display = 'block';
    }

    function switchTab(tab) {
      ['login','register'].forEach(t => {
        document.getElementById(t === 'login' ? 'loginPanel' : 'registerPanel')
          .classList.toggle('active', t === tab);
        document.getElementById(t === 'login' ? 'tabLogin' : 'tabRegister')
          .classList.toggle('active', t === tab);
      });
    }

    function showForgot() {
      document.getElementById('mainAuth').style.display   = 'none';
      document.getElementById('forgotPanel').style.display = 'block';
    }
    function hideForgot() {
      document.getElementById('forgotPanel').style.display = 'none';
      document.getElementById('mainAuth').style.display   = 'block';
    }

    function setMsg(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'msg ' + type;
    }

    async function doLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!username || !password) return setMsg('loginMsg', 'Compila tutti i campi.', 'error');
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = '⏳ Accesso…';
      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Errore');
        localStorage.setItem('auth_token',    data.token);
        localStorage.setItem('auth_username', data.username);
        window.location.href = '/';
      } catch(e) {
        setMsg('loginMsg', e.message, 'error');
        btn.disabled = false; btn.textContent = 'Accedi';
      }
    }

    async function doRegister() {
      const username  = document.getElementById('regUsername').value.trim();
      const email     = document.getElementById('regEmail').value.trim();
      const password  = document.getElementById('regPassword').value;
      const password2 = document.getElementById('regPassword2').value;
      if (!username || !email || !password) return setMsg('regMsg', 'Compila tutti i campi.', 'error');
      if (password !== password2) return setMsg('regMsg', 'Le password non coincidono.', 'error');
      if (password.length < 6)   return setMsg('regMsg', 'Password troppo corta (min. 6 caratteri).', 'error');
      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = '⏳ Registrazione…';
      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Errore');
        localStorage.setItem('auth_token',    data.token);
        localStorage.setItem('auth_username', data.username);
        window.location.href = '/';
      } catch(e) {
        setMsg('regMsg', e.message, 'error');
        btn.disabled = false; btn.textContent = 'Crea account';
      }
    }

    async function doForgot() {
      const email = document.getElementById('forgotEmail').value.trim();
      if (!email) return setMsg('forgotMsg', 'Inserisci la tua email.', 'error');
      const btn = document.getElementById('forgotBtn');
      btn.disabled = true; btn.textContent = '⏳ Invio…';
      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        setMsg('forgotMsg', data.message, 'success');
        if (data.reset_url) {
          const box = document.getElementById('resetLinkBox');
          box.style.display = 'block';
          box.innerHTML = `<strong>SMTP non configurato</strong> — usa questo link:<br>
            <a href="${data.reset_url}">${data.reset_url}</a>`;
        }
      } catch { setMsg('forgotMsg', 'Errore di rete.', 'error'); }
      finally  { btn.disabled = false; btn.textContent = 'Invia link di recupero'; }
    }

    async function doReset() {
      const pw  = document.getElementById('resetPassword').value;
      const pw2 = document.getElementById('resetPassword2').value;
      if (!pw)          return setMsg('resetMsg', 'Inserisci la nuova password.', 'error');
      if (pw !== pw2)   return setMsg('resetMsg', 'Le password non coincidono.', 'error');
      if (pw.length < 6) return setMsg('resetMsg', 'Password troppo corta (min. 6 caratteri).', 'error');
      const btn = document.getElementById('resetBtn');
      btn.disabled = true; btn.textContent = '⏳ Salvataggio…';
      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: _resetToken, new_password: pw }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Errore');
        setMsg('resetMsg', 'Password reimpostata! Reindirizzamento…', 'success');
        setTimeout(() => window.location.href = '/login', 2000);
      } catch(e) {
        setMsg('resetMsg', e.message, 'error');
        btn.disabled = false; btn.textContent = 'Imposta nuova password';
      }
    }

    // Enter key shortcuts
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('resetPanel').style.display  !== 'none') doReset();
      else if (document.getElementById('forgotPanel').style.display !== 'none') doForgot();
      else if (document.getElementById('loginPanel').classList.contains('active')) doLogin();
      else doRegister();
    });
  </script>
</body>
</html>
